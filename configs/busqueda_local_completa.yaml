# =============================================================
# EXPERIMENTO: Búsqueda local con heurísticas — todas las configs
# Equivalente a experimento_busqueda_local_heuristicas() del notebook
# con NNH, INSERCION y RANDOM_KEYS, todas las combinaciones M1-M4.
#
# Qué hace:
#   Para cada instancia .tsp, construye una ruta inicial con cada
#   heurística y aplica búsqueda local iterativa con Split hasta
#   convergencia o hasta alcanzar el timeout. Evalúa las 16
#   combinaciones de movimientos.
#
# Cómo correrlo:
#   python run.py configs/busqueda_local_completa.yaml
#
# Resultados en:
#   resultados/busqueda_local_completa/busqueda_local.xlsx
#   resultados/busqueda_local_completa/graficos/
# =============================================================

modo: busqueda_local

carpeta_salida: "resultados/busqueda_local_completa"

heuristicas:
  - NNH
  - INSERCION
  - RANDOM_KEYS

configuraciones_movimientos: "todas"

max_iter: 300
tolerancia: 1.0e-9
timeout: 2
seed_randomkeys: 11