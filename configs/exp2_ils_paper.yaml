# =====================================================================
# EXPERIMENTO 2: Iterated Local Search (ILS) + VND
# MacBook Pro i7 2.6GHz · 16 GB RAM · Python 3.12 · single-thread
# Tiempo estimado: ~1.5-2 h
# =====================================================================

modo: paper_ils

# Heurísticas constructivas
heuristicas:
  - NNH
  - INSERCION
  - RANDOM_KEYS

seed_randomkeys: 42
seed_perturbacion: 1234

# Métodos de búsqueda local dentro del ILS
metodos:
  - 2OPT_BEST
  - 2OPT_FIRST
  - SPLIT_M01
  - SPLIT_FULL
  - VND

# Perturbaciones a comparar
perturbaciones:
  - DOUBLE_BRIDGE
  - MULTI_MOVIMIENTO

# Parámetros de búsqueda local por iteración del ILS
max_iter: 200
tolerancia: 1.0e-9

# Parámetros del ILS
# 20 perturbaciones es estándar en la literatura para ILS sobre TSP
max_perturbaciones: 20
n_movimientos_perturb: 3

# 30 s garantiza al menos 5-8 ciclos de perturbación en instancias
# grandes; las pequeñas convergen mucho antes
timeout_total: 60.0